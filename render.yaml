services:
  - type: web
    name: simplifylegal
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DOCUMENT_ENCRYPTION_KEY
        generateValue: true
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: NODE_ENV
        value: production
