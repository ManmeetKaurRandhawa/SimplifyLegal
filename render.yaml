services:
  - type: web
    name: simplifylegal
    runtime: node
    plan: free
    buildCommand: cd frontend && npm ci --include=dev --include=optional && npm install @rolldown/binding-linux-x64-gnu@1.0.0-rc.17 --no-save && npm run build && cd ../backend && npm ci --include=optional && npm rebuild better-sqlite3 --build-from-source
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: JWT_SECRET
        generateValue: true
      - key: DOCUMENT_ENCRYPTION_KEY
        generateValue: true
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: NODE_ENV
        value: production
